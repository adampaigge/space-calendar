name: Scrape Space Events

on:
  schedule:
    # Every 6 hours
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      source:
        description: "Single source ID to scrape (leave blank for all)"
        required: false
      dry_run:
        description: "Dry run (no commit)"
        type: boolean
        default: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Run scraper
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.source }}" ]; then
            ARGS="--source ${{ github.event.inputs.source }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python scrape.py $ARGS

      - name: Commit updated data
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "Space Calendar Bot"
          git config user.email "bot@supernovalabs.co.uk"
          git add data/events.json data/runs.json data/uk.ics
          git diff --cached --quiet || git commit -m "chore: scrape $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
